<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 812" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4ebf3"/>
      <stop offset="1" stop-color="#eef6f4"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde5e3"/>
      <stop offset="1" stop-color="#cfd9d6"/>
    </linearGradient>
  </defs>

  <!-- 天空 -->
  <rect x="0" y="0" width="750" height="600" fill="url(#sky)"/>
  <!-- 云 -->
  <ellipse cx="150" cy="120" rx="90" ry="34" fill="#ffffff" opacity="0.75"/>
  <ellipse cx="560" cy="90" rx="110" ry="38" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="400" cy="160" rx="70" ry="26" fill="#ffffff" opacity="0.6"/>

  <!-- 远景建筑群 -->
  <g fill="#aeb9b8">
    <rect x="40" y="330" width="120" height="270"/>
    <rect x="600" y="300" width="120" height="300"/>
    <rect x="250" y="360" width="90" height="240"/>
    <rect x="430" y="350" width="90" height="250"/>
  </g>
  <!-- 建筑窗格 -->
  <g fill="#cdd6d4" opacity="0.8">
    <rect x="60" y="360" width="18" height="22"/><rect x="92" y="360" width="18" height="22"/><rect x="124" y="360" width="18" height="22"/>
    <rect x="60" y="410" width="18" height="22"/><rect x="92" y="410" width="18" height="22"/><rect x="124" y="410" width="18" height="22"/>
    <rect x="620" y="340" width="18" height="22"/><rect x="652" y="340" width="18" height="22"/><rect x="684" y="340" width="18" height="22"/>
    <rect x="620" y="390" width="18" height="22"/><rect x="652" y="390" width="18" height="22"/><rect x="684" y="390" width="18" height="22"/>
  </g>

  <!-- 大门主体：两侧立柱 + 横梁 -->
  <g fill="#94a09f">
    <rect x="120" y="250" width="74" height="380"/>
    <rect x="556" y="250" width="74" height="380"/>
    <rect x="120" y="250" width="510" height="48"/>
  </g>
  <!-- 立柱高光 -->
  <g fill="#aab5b4" opacity="0.6">
    <rect x="128" y="250" width="14" height="380"/>
    <rect x="564" y="250" width="14" height="380"/>
  </g>

  <!-- 中央石碑 -->
  <rect x="330" y="300" width="92" height="250" rx="14" fill="#b23a3a"/>
  <rect x="330" y="300" width="92" height="250" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
  <text x="376" y="392" text-anchor="middle" fill="#ffffff" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="700" letter-spacing="2">合肥</text>
  <text x="376" y="430" text-anchor="middle" fill="#ffffff" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="700" letter-spacing="2">师范</text>
  <text x="376" y="468" text-anchor="middle" fill="#ffffff" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" font-weight="700" letter-spacing="2">学院</text>

  <!-- 地面广场 -->
  <rect x="0" y="600" width="750" height="212" fill="url(#ground)"/>
  <!-- 绿化 -->
  <g fill="#8fc2a0" opacity="0.85">
    <circle cx="90" cy="600" r="34"/><circle cx="130" cy="590" r="28"/>
    <circle cx="660" cy="600" r="34"/><circle cx="620" cy="592" r="26"/>
  </g>
  <!-- 步道 -->
  <path d="M300 812 L340 600 L410 600 L450 812 Z" fill="#c2ccc9" opacity="0.7"/>
</svg>
