<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <title>爱·合师 AI辅导员</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/A_cute_2D_cartoon_style_Chines_2026-07-10T15-22-43.png">
</head>
<body>
    <div class="app-container">
        <!-- Splash 启动页 -->
        <div id="splash" class="splash">
            <img class="s-avatar" src="assets/A_cute_2D_cartoon_style_Chines_2026-07-10T15-22-43.png" alt="爱·合师">
            <h1 class="s-title">爱·合师</h1>
            <p class="s-sub">你的校园 AI 辅导员</p>
            <button class="s-btn" id="enterBtn" aria-label="进入主应用">进入对话</button>
        </div>

        <!-- 主聊天界面 -->
        <div id="app" class="app hidden">
            <!-- 导航栏 -->
            <nav class="navbar" role="navigation" aria-label="顶部导航">
                <div class="nav-left">
                    <span id="navScene" class="nav-scene" aria-live="polite"></span>
                </div>
                <div class="nav-title">爱·合师</div>
                <div class="nav-right">
                    <img class="mini-avatar" src="assets/A_cute_2D_cartoon_style_Chines_2026-07-10T15-22-43.png" alt="AI 辅导员头像">
                </div>
            </nav>

            <!-- 心理场景安全黄条 -->
            <div id="safetyBar" class="safety-bar hidden" role="alert">
                <span class="s-text">如果你正在经历困难，可以点击「紧急求助」获取支持</span>
                <button class="s-btn" id="safetyBtn" aria-label="打开紧急求助弹窗">紧急求助</button>
            </div>

            <!-- 聊天消息区 -->
            <div id="chatScreen" class="chat-screen" role="log" aria-live="polite" aria-label="聊天消息">
                <!-- 消息将通过JS动态添加 -->
            </div>

            <!-- 心理场景常驻紧急求助 FAB -->
            <button id="fabBtn" class="fab hidden" aria-label="紧急求助">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                紧急求助
            </button>

            <!-- 输入栏 -->
            <div class="input-bar">
                <label for="msgInput" class="sr-only">输入消息</label>
                <textarea id="msgInput" placeholder="输入消息..." rows="1" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="消息输入框"></textarea>
                <button class="send" id="sendBtn" aria-label="发送消息">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>

            <!-- 底部 Tab Bar -->
            <nav class="tabbar" role="tablist" aria-label="场景切换">
                <button class="tab active" data-index="0" role="tab" aria-selected="true" aria-label="校园生活">
                    <div class="t-ico">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <span>校园</span>
                </button>
                <button class="tab" data-index="1" role="tab" aria-selected="false" aria-label="技能提升">
                    <div class="t-ico">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    </div>
                    <span>技能</span>
                </button>
                <button class="tab" data-index="2" role="tab" aria-selected="false" aria-label="心理陪伴">
                    <div class="t-ico">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    </div>
                    <span>心理</span>
                </button>
                <button class="tab" data-index="3" role="tab" aria-selected="false" aria-label="事务办理">
                    <div class="t-ico">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    </div>
                    <span>事务</span>
                </button>
            </nav>
        </div>

        <!-- 危机弹层 -->
        <div id="crisisModal" class="crisis-overlay hidden" role="dialog" aria-modal="true" aria-label="紧急求助">
            <div class="crisis-card">
                <button class="cr-close" id="crisisClose" aria-label="关闭">&times;</button>
                <div class="cr-title">紧急求助</div>
                <p class="cr-line">如果你正在经历困难，请立即联系：</p>
                <button class="cr-btn" id="crisisCall">拨打心理援助热线</button>
                <p class="cr-line">全国24小时心理援助热线：<span class="cr-tel">400-161-9995</span></p>
                <p class="cr-line">北京心理危机研究与干预中心：<span class="cr-tel">010-82951332</span></p>
                <p class="cr-sub">你不是一个人，我们都在这里支持你</p>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="js/scenes.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
